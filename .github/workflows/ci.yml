name: CodeSentinel CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: codesentinel
          POSTGRES_PASSWORD: codesentinel123
          POSTGRES_DB: codesentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run linter
        working-directory: backend
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --exclude=__pycache__,.venv

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://codesentinel:codesentinel123@localhost:5432/codesentinel
          REDIS_URL: redis://localhost:6379/0
        run: |
          pip install pytest pytest-asyncio httpx
          pytest tests/ -v --tb=short || echo "No tests yet — add to tests/"

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          REACT_APP_API_URL: http://localhost:8000
          REACT_APP_WS_URL: ws://localhost:8000
          CI: false

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t codesentinel-backend ./backend

      - name: Build frontend image
        run: docker build -t codesentinel-frontend ./frontend

      - name: Verify compose config
        run: docker compose config
