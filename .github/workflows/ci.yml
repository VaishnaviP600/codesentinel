name: CodeSentinel CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: backend
        run: pip install fastapi uvicorn pydantic pydantic-settings python-dotenv
      - name: Check syntax
        working-directory: backend
        run: python -m py_compile main.py agents/sast_agent.py agents/fix_agent.py
      - name: Done
        run: echo "Backend syntax check passed!"

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps
      - name: Build check
        working-directory: frontend
        run: echo "Frontend dependencies installed successfully!"
      - name: Done
        run: echo "Frontend check passed!"
